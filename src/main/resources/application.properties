spring.datasource.url=jdbc:mysql://localhost:3306/english_writing_support
spring.datasource.username=root
spring.datasource.password=nguyenhuytan2004
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Load .env as a properties source (works for KEY=value format)
spring.config.import=optional:file:./.env[.properties],optional:file:../.env[.properties]

# 1. API Key lấy từ Groq Console (https://console.groq.com/keys)
spring.ai.openai.api-key=${GROQ_API_KEY}
# 2. Trỏ URL về API của Groq thay vì OpenAI mặc định
spring.ai.openai.base-url=https://api.groq.com/openai
# 3. Cấu hình Model và tham số phản hồi
# Llama-3.3-70b-versatile là model cân bằng tốt nhất hiện nay trên Groq
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.3
# 4. (Tùy chọn) Ép kiểu JSON ở mức hệ thống để tránh lỗi parse
spring.ai.openai.chat.options.response-format.type=json_object